<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;600;800&amp;display=swap');</style>
    <!-- Cube gradients (scaled: cube 260px tall, viewbox unit = 2.6x) -->
    <linearGradient id="og-top" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF5C00"/>
      <stop offset="100%" stop-color="#FF7A30"/>
    </linearGradient>
    <linearGradient id="og-right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CC4A00"/>
      <stop offset="100%" stop-color="#A33A00"/>
    </linearGradient>
    <linearGradient id="og-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8A3000"/>
      <stop offset="100%" stop-color="#6A2400"/>
    </linearGradient>
    <clipPath id="og-clip">
      <polygon points="220,16 431,75 220,134 9,75"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Subtle dot grid texture -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="white" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Orange gradient glow behind cube -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FF5C00" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#FF5C00" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="220" cy="315" rx="280" ry="280" fill="url(#glow)"/>

  <!-- ═══ CUBE MARK (260px tall, centered at x=220, y=315) ═══
       Original 100×100 viewBox scaled ×2.6, translated to center at (220,315)
       Scale: x' = 220 + (x-50)*2.6 - hmm, let me compute directly.
       Original cube: x=[12..88], y=[6..94], center=(50,50)
       Scale=2.6, translate so cube center=(220,315)
       x' = (x-50)*2.6 + 220
       y' = (y-50)*2.6 + 315
       Key points:
         (50,6)  → (220, 315 + (6-50)*2.6)  = (220, 315-114.4) = (220, 200.6) ≈ (220, 201)
         (88,28) → (220 + 38*2.6, 315-22*2.6) = (220+98.8, 315-57.2) = (319, 258)
         (88,72) → (319, 315+22*2.6) = (319, 372)
         (50,94) → (220, 315+44*2.6) = (220, 429)
         (12,72) → (220-98.8, 372) = (121, 372)
         (12,28) → (121, 258)
         (50,50) → (220, 315)
  -->

  <!-- Left face -->
  <polygon points="121,258 220,315 220,429 121,372" fill="url(#og-left)"/>
  <!-- Right face -->
  <polygon points="319,258 319,372 220,429 220,315" fill="url(#og-right)"/>
  <!-- Top face -->
  <polygon points="220,201 319,258 220,315 121,258" fill="url(#og-top)"/>

  <!-- Grid on top face (scaled ×2.6) -->
  <!-- 1/3 lines: original (37,13)→(75,35) scaled: x'=(37-50)*2.6+220=186, y'=(13-50)*2.6+315=219 → (75-50)*2.6+220=285, y'=(35-50)*2.6+315=276 -->
  <g clip-path="url(#og-clip)" stroke="white" stroke-width="1.8" fill="none">
    <clipPath id="og-clip">
      <polygon points="220,201 319,258 220,315 121,258"/>
    </clipPath>
    <line x1="186" y1="219" x2="285" y2="276" opacity="0.20"/>
    <line x1="154" y1="238" x2="253" y2="295" opacity="0.12"/>
    <line x1="254" y1="219" x2="155" y2="276" opacity="0.20"/>
    <line x1="286" y1="238" x2="187" y2="295" opacity="0.12"/>
  </g>

  <!-- Edges -->
  <line x1="220" y1="315" x2="220" y2="429" stroke="#3D1500" stroke-width="2.6" opacity="0.7"/>
  <line x1="121" y1="372" x2="220" y2="429" stroke="#3D1500" stroke-width="1.6" opacity="0.5"/>
  <line x1="319" y1="372" x2="220" y2="429" stroke="#3D1500" stroke-width="1.6" opacity="0.5"/>
  <line x1="220" y1="201" x2="319" y2="258" stroke="#FF9060" stroke-width="2" opacity="0.35"/>
  <line x1="220" y1="201" x2="121" y2="258" stroke="#FF9060" stroke-width="2" opacity="0.35"/>
  <circle cx="220" cy="201" r="5.5" fill="#FFB880" opacity="0.85"/>

  <!-- ═══ TEXT BLOCK ═══ -->
  <!-- OUTPUTCRAFT -->
  <text
    x="440"
    y="310"
    font-family="'Bricolage Grotesque','Space Grotesk','Arial Black',system-ui,sans-serif"
    font-weight="800"
    font-size="96"
    letter-spacing="-3"
  >
    <tspan fill="#FFFFFF">OUTPUT</tspan><tspan fill="#FF5C00">CRAFT</tspan>
  </text>

  <!-- Tagline -->
  <text
    x="442"
    y="375"
    font-family="'Bricolage Grotesque','DM Sans',system-ui,sans-serif"
    font-weight="400"
    font-size="26"
    fill="#FFFFFF"
    opacity="0.50"
    letter-spacing="0.5"
  >Sites web sur mesure · Livrés en 3 semaines · Lighthouse &gt;85</text>

  <!-- URL -->
  <text
    x="442"
    y="560"
    font-family="'DM Sans',system-ui,sans-serif"
    font-weight="500"
    font-size="22"
    fill="#FF5C00"
    opacity="0.70"
    letter-spacing="1"
  >outputcraft.com</text>

  <!-- Thin orange bottom bar -->
  <rect x="0" y="618" width="1200" height="3" fill="#FF5C00" opacity="0.6"/>
</svg>
