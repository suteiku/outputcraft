<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 490 100" width="490" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&amp;display=swap');
    </style>
    <linearGradient id="g-top-dk" x1="88" y1="6" x2="12" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF5C00"/>
      <stop offset="100%" stop-color="#FF7A30"/>
    </linearGradient>
    <!-- On dark bg, faces slightly lighter so cube reads distinctly -->
    <linearGradient id="g-right-dk" x1="0" y1="28" x2="0" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="g-left-dk" x1="0" y1="28" x2="0" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#242424"/>
      <stop offset="100%" stop-color="#0E0E0E"/>
    </linearGradient>
    <clipPath id="clip-top-dk">
      <polygon points="50,6 88,28 50,50 12,28"/>
    </clipPath>
  </defs>

  <!-- Dark background -->
  <rect width="490" height="100" fill="#0A0A0A"/>

  <!-- ═══════════ CUBE MARK ═══════════ -->
  <polygon points="12,28 50,50 50,94 12,72" fill="url(#g-left-dk)"/>
  <polygon points="88,28 88,72 50,94 50,50" fill="url(#g-right-dk)"/>
  <polygon points="50,6 88,28 50,50 12,28" fill="url(#g-top-dk)"/>

  <!-- Blueprint grid on top face -->
  <g clip-path="url(#clip-top-dk)" stroke="white" stroke-width="0.7" fill="none">
    <line x1="37" y1="13" x2="75" y2="35" opacity="0.20"/>
    <line x1="25" y1="21" x2="63" y2="43" opacity="0.12"/>
    <line x1="63" y1="13" x2="25" y2="35" opacity="0.20"/>
    <line x1="75" y1="21" x2="37" y2="43" opacity="0.12"/>
  </g>

  <!-- Edges — brighter on dark bg for definition -->
  <line x1="50" y1="50" x2="50" y2="94" stroke="#333" stroke-width="0.8"/>
  <line x1="12" y1="72" x2="50" y2="94" stroke="white" stroke-width="0.5" opacity="0.08"/>
  <line x1="88" y1="72" x2="50" y2="94" stroke="white" stroke-width="0.5" opacity="0.08"/>
  <line x1="50" y1="6" x2="88" y2="28" stroke="#FFAA70" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="6" x2="12" y2="28" stroke="#FFAA70" stroke-width="1" opacity="0.5"/>

  <!-- Outer hexagon rim (visible silhouette on dark) -->
  <polygon points="12,28 50,6 88,28 88,72 50,94 12,72"
    fill="none"
    stroke="white"
    stroke-width="0.6"
    opacity="0.10"/>

  <circle cx="50" cy="6" r="2.2" fill="#FFB880" opacity="0.9"/>

  <!-- ═══════════ DIVIDER ═══════════ -->
  <line x1="112" y1="20" x2="112" y2="80" stroke="#FF5C00" stroke-width="0.8" opacity="0.35"/>

  <!-- ═══════════ WORDMARK ═══════════ -->
  <text
    x="128"
    y="66"
    font-family="'Bricolage Grotesque', 'Space Grotesk', 'Arial Black', system-ui, sans-serif"
    font-weight="800"
    font-size="44"
    letter-spacing="-1.5"
  >
    <tspan fill="#FFFFFF">OUTPUT</tspan><tspan fill="#FF5C00">CRAFT</tspan>
  </text>
</svg>
